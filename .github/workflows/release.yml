name: Release

# Сборка установщиков под все ОС и публикация GitHub Release.
# Запуск: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: --linux
          - os: windows-latest
            args: --win
          - os: macos-latest
            args: --mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build renderer
        run: npm run build
      - name: Package
        run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          # Подписи нет — отключаем автопоиск сертификатов на macOS
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
          generate_release_notes: true
