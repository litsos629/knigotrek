<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- connect-src включает Supabase (иначе CSP блокирует синхронизацию);
         frame-src blob: нужен превью PDF-отчётов в iframe -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http://localhost:* https://*.supabase.co wss://*.supabase.co; font-src 'self' data:; frame-src 'self' blob:;" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="Книготрек — трекер прогресса написания книг" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Книготрек" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/180.png" />
    <title>Книготрек</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
